<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Reference Archive</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <main class="page">
    <header class="header">
      <h1 class="title">레퍼런스 모음 zip</h1>
      <p class="subtitle">디자이너를 위한 레퍼런스 사이트 아카이브</p>
    </header>

    <section class="section">
      <h2 class="section-title">Visual Reference</h2>
      <div class="slider-wrap">
        <button class="nav-btn nav-prev" type="button" aria-label="Previous slide">&lt;</button>
        <div class="cards cols-3" id="cards-visual"></div>
        <div class="slider-nav">
          <span class="nav-dots"><i class="nav-dot active"></i><i class="nav-dot"></i><i class="nav-dot"></i></span>
        </div>
        <button class="nav-btn nav-next" type="button" aria-label="Next slide">&gt;</button>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">UI</h2>
      <div class="slider-wrap">
        <button class="nav-btn nav-prev" type="button" aria-label="Previous slide">&lt;</button>
        <div class="cards cols-2" id="cards-ui"></div>
        <div class="slider-nav">
          <span class="nav-dots"><i class="nav-dot active"></i><i class="nav-dot"></i><i class="nav-dot"></i></span>
        </div>
        <button class="nav-btn nav-next" type="button" aria-label="Next slide">&gt;</button>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">Typography</h2>
      <div class="slider-wrap">
        <button class="nav-btn nav-prev" type="button" aria-label="Previous slide">&lt;</button>
        <div class="cards cols-3" id="cards-type"></div>
        <div class="slider-nav">
          <span class="nav-dots"><i class="nav-dot active"></i><i class="nav-dot"></i><i class="nav-dot"></i></span>
        </div>
        <button class="nav-btn nav-next" type="button" aria-label="Next slide">&gt;</button>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">Branding</h2>
      <div class="slider-wrap">
        <button class="nav-btn nav-prev" type="button" aria-label="Previous slide">&lt;</button>
        <div class="cards cols-2" id="cards-branding"></div>
        <div class="slider-nav">
          <span class="nav-dots"><i class="nav-dot active"></i><i class="nav-dot"></i><i class="nav-dot"></i></span>
        </div>
        <button class="nav-btn nav-next" type="button" aria-label="Next slide">&gt;</button>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">Motion</h2>
      <div class="slider-wrap">
        <button class="nav-btn nav-prev" type="button" aria-label="Previous slide">&lt;</button>
        <div class="cards cols-2" id="cards-motion"></div>
        <div class="slider-nav">
          <span class="nav-dots"><i class="nav-dot active"></i><i class="nav-dot"></i><i class="nav-dot"></i></span>
        </div>
        <button class="nav-btn nav-next" type="button" aria-label="Next slide">&gt;</button>
      </div>
    </section>
  </main>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
