<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Reference Cards</title>
    <style>
        :root {
            --bg: #ffffff;
            --ink: #112240;
            --muted: #4b6288;
            --card: #ffffff;
            --line: #d8e5ff;
            --line-strong: #9fbef4;
            --accent: #1d5fe3;
            --chip: #edf4ff;
            --chip-line: #cfe0ff;
            --chip-ink: #274879;
            --shadow: 0 4px 10px rgba(17, 58, 130, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Pretendard", "SUIT", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
            color: var(--ink);
            background: var(--bg);
            min-height: 100vh;
        }

        .page {
            width: min(1360px, 100% - 48px);
            margin: 0 auto;
            padding: 40px 0 80px;
        }

        .header {
            margin-bottom: 26px;
        }

        .title {
            font-size: clamp(28px, 3.8vw, 46px);
            line-height: 1.08;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
            font-weight: 730;
        }

        .subtitle {
            max-width: 780px;
            color: var(--muted);
            font-size: clamp(14px, 1.6vw, 17px);
            line-height: 1.6;
        }

        .section {
            margin-top: 34px;
        }

        .section-title {
            font-size: 14px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 16px;
            color: #5f636b;
            border-top: 2px solid #e2e4e8;
            padding-top: 10px;
        }

        .slider-wrap {
            position: relative;
        }

        .slider-wrap::after {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            width: 24px;
            height: 100%;
            pointer-events: none;
            background: linear-gradient(to right, rgba(255, 255, 255, 0), #ffffff 92%);
        }

        .cards {
            --card-width: 360px;
            --peek: 96px;
            display: flex;
            gap: 18px;
            overflow-x: auto;
            overscroll-behavior-x: contain;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .cards.cols-3 {
            --card-width: calc((100% - 36px - var(--peek)) / 3);
        }

        .cards.cols-2 {
            --card-width: calc((100% - 18px - var(--peek)) / 2);
        }

        .cards::-webkit-scrollbar {
            display: none;
        }

        .card {
            position: relative;
            display: block;
            flex: 0 0 var(--card-width);
            scroll-snap-align: start;
            border: 1px solid var(--line);
            border-radius: 16px;
            overflow: hidden;
            background: var(--card);
            color: inherit;
            text-decoration: none;
            box-shadow: var(--shadow);
            transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
        }

        .card:hover,
        .card:focus-within {
            transform: translateY(-3px);
            border-color: var(--line-strong);
            box-shadow: 0 8px 18px rgba(17, 58, 130, 0.1);
        }

        .thumb-wrap {
            position: relative;
            height: 196px;
            background: #f6f9ff;
            overflow: hidden;
        }

        .thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            display: block;
        }

        .thumb-fallback {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            color: #274879;
            font-size: 13px;
            font-weight: 600;
            background: repeating-linear-gradient(135deg,
                    rgba(237, 244, 255, 0.95),
                    rgba(237, 244, 255, 0.95) 14px,
                    rgba(222, 234, 255, 0.95) 14px,
                    rgba(222, 234, 255, 0.95) 28px);
        }

        .card.image-error .thumb-fallback {
            display: flex;
        }

        .card-body {
            padding: 14px 14px 16px;
        }

        .card-head {
            display: flex;
            align-items: start;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
        }

        .site-name {
            font-size: 17px;
            line-height: 1.25;
            letter-spacing: -0.01em;
            font-weight: 700;
            color: #102549;
        }

        .card:hover .site-name,
        .card:focus-visible .site-name {
            color: var(--accent);
        }

        .context {
            font-size: 11px;
            line-height: 1;
            border-radius: 999px;
            padding: 7px 9px;
            white-space: nowrap;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .context-hot {
            border: 1px solid #f5b5b5;
            background: #fff1f1;
            color: #c62828;
        }

        .context-new {
            border: 1px solid #f1d788;
            background: #fff9e5;
            color: #9a6b00;
        }

        .desc {
            font-size: 13px;
            line-height: 1.55;
            color: #4b6288;
            margin-bottom: 11px;
            min-height: 40px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            list-style: none;
        }

        .tag {
            font-size: 12px;
            background: var(--chip);
            border: 1px solid var(--chip-line);
            color: var(--chip-ink);
            border-radius: 999px;
            padding: 5px 8px;
            line-height: 1.1;
        }

        .is-safari .site-name {
            font-size: 18px;
        }

        .is-safari .desc {
            font-size: 14px;
        }

        .is-safari .tag {
            font-size: 13px;
        }

        .is-safari .context {
            font-size: 12px;
        }

        @media (max-width: 720px) {
            .page {
                width: calc(100% - 24px);
                padding-top: 24px;
            }

            .cards {
                --peek: 24px;
                --card-width: min(84vw, 320px);
                scroll-snap-type: x proximity;
            }

            .slider-wrap::after {
                width: 14px;
            }

            .thumb-wrap {
                height: 186px;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <header class="header">
            <h1 class="title">Find your site</h1>
            <p class="subtitle">카테고리에 맞게 정리해둔 레퍼런스 사이트 아카이빙 입니다.</p>
        </header>

        <section class="section">
            <h2 class="section-title">Visual Reference</h2>
            <div class="slider-wrap">
                <div class="cards cols-3" id="cards-visual"></div>
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">UI</h2>
            <div class="slider-wrap">
                <div class="cards cols-2" id="cards-ui"></div>
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">Typography</h2>
            <div class="slider-wrap">
                <div class="cards cols-3" id="cards-type"></div>
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">Branding</h2>
            <div class="slider-wrap">
                <div class="cards cols-2" id="cards-branding"></div>
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">Motion</h2>
            <div class="slider-wrap">
                <div class="cards cols-2" id="cards-motion"></div>
            </div>
        </section>
    </main>

    <script>
        const groups = {
            "cards-type": [
                {
                    name: "Font In Use",
                    url: "https://fontsinuse.com/",
                    badge: "HOT",
                    image: "images/font-in-use.jpg",
                    description: "실사례를 보면서 인쇄물과 디지털 톤을 함께 참고하기 좋습니다.",
                    tags: ["#인쇄물", "#실사례", "#에디토리얼"]
                },
                {
                    name: "Typewolf",
                    url: "https://www.typewolf.com/",
                    image: "images/typewolf.jpg",
                    description: "웹에서 잘 어울리는 폰트 조합을 빠르게 탐색할 수 있습니다.",
                    tags: ["#폰트페어링", "#웹타입", "#톤앤매너"]
                },
                {
                    name: "Typeverything",
                    url: "https://typeverything.com/",
                    image: "images/typeverything.jpg",
                    description: "귀여운 영문 폰트를 폭넓게 찾아볼 수 있어요.",
                    tags: ["#폰트탐색", "#영문폰트"]
                },
                {
                    name: "I Love Typography",
                    url: "https://ilovetypography.com/",
                    image: "images/i-love-typography.jpg",
                    description: "타이포 트렌드와 칼럼을 볼 수 있는 커뮤니티입니다.",
                    tags: ["#타이포저널", "#트렌드", "#커뮤니티"]
                },
                {
                    name: "눈누",
                    url: "https://noonnu.cc/",
                    image: "images/noonnu.jpg",
                    description: "무료 한글 폰트가 많고 웹주소를 복붙해서 활용하기 좋습니다.",
                    tags: ["#한글폰트", "#웹폰트", "#무료폰트"]
                }
            ],
            "cards-ui": [
                {
                    name: "Collect UI",
                    url: "https://collectui.com/",
                    badge: "NEW",
                    image: "images/collect-ui.jpg",
                    description: "160가지가 넘는 카테고리로 분류한 웹화면 ui를 모아둔 사이트입니다.",
                    tags: ["#UI", "#카테고리", "#아이데이션"]
                },
                {
                    name: "Godly",
                    url: "https://godly.website/",
                    image: "images/godly.jpg",
                    description: "완성도 높은 웹 UI와 인터랙션을 감각적으로 탐색하기 좋습니다.",
                    tags: ["#웹디자인", "#완성도"]
                },
                {
                    name: "Mobbin",
                    url: "https://mobbin.com/",
                    image: "images/mobbin.jpg",
                    description: "앱 UI 패턴을 수집할 때 가장 빠른 레퍼런스 중 하나입니다.",
                    tags: ["#App", "#모바일UI", "#앱디자인"]
                }
            ],
            "cards-branding": [
                {
                    name: "BP&O",
                    url: "https://bpando.org/",
                    image: "images/bp-o.jpg",
                    description: "브랜딩 프로젝트를 설명문과 함께 읽기 좋습니다.",
                    tags: ["#브랜딩", "#대형프로젝트", "#아티클"]
                },
                {
                    name: "Brenden",
                    url: "https://brenden.kr/",
                    image: "images/brenden.jpg",
                    description: "국내 브랜딩 기업인 brenden의 아카이빙 사이트입니다.",
                    tags: ["#국내레퍼런스", "아카이빙"]
                },
                {
                    name: "Brand New",
                    url: "https://www.underconsideration.com/brandnew/",
                    image: "images/brandnew.jpg",
                    description: "리브랜딩 케이스와 반응을 함께 보며 방향을 비교하기 좋습니다.",
                    tags: ["#리브랜딩", "#로고", "#리뷰"]
                },
                {
                    name: "Identity Designed",
                    url: "https://identitydesigned.com/",
                    image: "images/identity-designed.jpg",
                    description: "완성도 높은 브랜드 시스템 사례를 모아보기 좋은 아카이브입니다.",
                    tags: ["#브랜드시스템", "#편집디자인"]
                }
            ],
            "cards-visual": [
                {
                    name: "Pinterest",
                    url: "https://www.pinterest.com/",
                    image: "images/pinterest.jpg",
                    description: "무드보드 제작 기능으로 빠르게 이미지를 모을 수 있습니다.",
                    tags: ["#무드보드", "#이미지", "#아이디어"]
                },
                {
                    name: "Cosmos",
                    url: "https://www.cosmos.so/",
                    badge: "HOT",
                    image: "images/cosmos.jpg",
                    description: "취향 기반 큐레이션으로 레퍼런스를 확장하기 좋습니다.",
                    tags: ["#큐레이션", "#연결탐색", "#감도높은"]
                },
                {
                    name: "Designspiration",
                    url: "https://www.designspiration.com/",
                    image: "images/designspiration.jpg",
                    description: "색감을 중심으로 이미지를 빠르게 서치하기 편한 사이트입니다.",
                    tags: ["#색감", "#스타일"]
                },
                {
                    name: "Awwwards",
                    url: "https://www.awwwards.com/",
                    image: "images/awwwards.jpg",
                    description: "비주얼 임팩트 강한 웹 사례를 빠르게 훑기 좋습니다.",
                    tags: ["#하이엔드", "#웹트렌드", "#인터랙티브"]
                },
                {
                    name: "SiteInspire",
                    url: "https://www.siteinspire.com/",
                    image: "images/siteinspire.jpg",
                    description: "카테고리 기반으로 원하는 분위기 사이트를 모으기 좋습니다.",
                    tags: ["#큐레이션", "#카테고리", "#무드"]
                }
            ],
            "cards-motion": [
                {
                    name: "Eye Candy",
                    url: "https://eycndy.com/",
                    image: "images/eyecandy.jpg",
                    description: "모션 중심 레퍼런스를 감각적으로 빠르게 모아보기 좋습니다.",
                    tags: ["#모션", "#웹무드"]
                },
                {
                    name: "LottieFiles",
                    url: "https://lottiefiles.com/",
                    image: "images/lottiefiles.jpg",
                    description: "애니메이션 샘플과 사용 예시를 함께 보며 아이디어를 얻기 좋습니다.",
                    tags: ["#애니메이션", "#컴포넌트"]
                },
                {
                    name: "Motionographer",
                    url: "https://motionographer.com/",
                    image: "images/motiongrapher.jpg",
                    description: "모션 디자인 프로젝트를 깊게 참고하기 좋은 아카이브입니다.",
                    tags: ["#모션디자인", "#영상레퍼런스"]
                }
            ]
        };

        const getPreviewUrl = (url) => `https://image.thum.io/get/width/900/noanimate/${encodeURIComponent(url)}`;

        (() => {
            const ua = navigator.userAgent.toLowerCase();
            const isSafari = ua.includes("safari")
                && !ua.includes("chrome")
                && !ua.includes("chromium")
                && !ua.includes("crios")
                && !ua.includes("fxios")
                && !ua.includes("edgios")
                && !ua.includes("opr");
            if (isSafari) {
                document.documentElement.classList.add("is-safari");
                document.body.classList.add("is-safari");
            }
        })();

        const renderCard = (item, index) => {
            const article = document.createElement("a");
            article.className = "card";
            article.href = item.url;
            article.target = "_blank";
            article.rel = "noopener noreferrer";
            article.setAttribute("aria-label", `${item.name} 사이트 열기`);

            const previewSrc = item.image || getPreviewUrl(item.url);
            const loadingMode = index < 2 ? "eager" : "lazy";
            const fetchPriority = index < 2 ? "high" : "auto";
            const tags = item.tags.map((tag) => `<li class=\"tag\">${tag}</li>`).join("");
            const badgeClass = item.badge === "HOT"
                ? "context-hot"
                : item.badge === "NEW"
                    ? "context-new"
                    : "";
            const badgeMarkup = item.badge ? `<span class="context ${badgeClass}">${item.badge}</span>` : "";

            article.innerHTML = `
                <div class="thumb-wrap">
                    <img class="thumb" src="${previewSrc}" alt="${item.name} 미리보기 이미지" loading="${loadingMode}" fetchpriority="${fetchPriority}" referrerpolicy="no-referrer" />
                    <div class="thumb-fallback">미리보기 이미지</div>
                </div>
                <div class="card-body">
                    <div class="card-head">
                        <strong class="site-name">${item.name}</strong>
                        ${badgeMarkup}
                    </div>
                    <p class="desc">${item.description}</p>
                    <ul class="tags">${tags}</ul>
                </div>
            `;

            const image = article.querySelector(".thumb");
            image.addEventListener("error", () => {
                article.classList.add("image-error");
            });

            return article;
        };

        Object.entries(groups).forEach(([targetId, items]) => {
            const container = document.getElementById(targetId);
            items.forEach((item, index) => {
                container.appendChild(renderCard(item, index));
            });
        });
    </script>
</body>

</html>
