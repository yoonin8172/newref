<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Reference Archive</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="stylesheet" href="./src/style.css" />
</head>

<body>
  <main class="page">
    <header class="header">
      <h1 class="title">레퍼런스 모음 zip</h1>
      <p class="subtitle">디자이너를 위한 레퍼런스 사이트 아카이브</p>
    </header>

    <section class="section">
      <div class="section-head">
        <h2 class="section-title">Visual Reference</h2>
        <button type="button" class="add-icon-btn" data-add-reference data-category="cards-visual"
          data-category-label="Visual Reference" aria-label="Visual Reference에 사이트 추가">+</button>
      </div>
      <div class="slider-wrap">
        <button class="nav-btn nav-prev" type="button" aria-label="Previous slide">&lt;</button>
        <div class="cards cols-3" id="cards-visual"></div>
        <div class="slider-nav">
          <span class="nav-dots"><i class="nav-dot active"></i><i class="nav-dot"></i><i class="nav-dot"></i></span>
        </div>
        <button class="nav-btn nav-next" type="button" aria-label="Next slide">&gt;</button>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2 class="section-title">UI</h2>
        <button type="button" class="add-icon-btn" data-add-reference data-category="cards-ui" data-category-label="UI"
          aria-label="UI에 사이트 추가">+</button>
      </div>
      <div class="slider-wrap">
        <button class="nav-btn nav-prev" type="button" aria-label="Previous slide">&lt;</button>
        <div class="cards cols-2" id="cards-ui"></div>
        <div class="slider-nav">
          <span class="nav-dots"><i class="nav-dot active"></i><i class="nav-dot"></i><i class="nav-dot"></i></span>
        </div>
        <button class="nav-btn nav-next" type="button" aria-label="Next slide">&gt;</button>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2 class="section-title">Typography</h2>
        <button type="button" class="add-icon-btn" data-add-reference data-category="cards-type"
          data-category-label="Typography" aria-label="Typography에 사이트 추가">+</button>
      </div>
      <div class="slider-wrap">
        <button class="nav-btn nav-prev" type="button" aria-label="Previous slide">&lt;</button>
        <div class="cards cols-3" id="cards-type"></div>
        <div class="slider-nav">
          <span class="nav-dots"><i class="nav-dot active"></i><i class="nav-dot"></i><i class="nav-dot"></i></span>
        </div>
        <button class="nav-btn nav-next" type="button" aria-label="Next slide">&gt;</button>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2 class="section-title">Branding</h2>
        <button type="button" class="add-icon-btn" data-add-reference data-category="cards-branding"
          data-category-label="Branding" aria-label="Branding에 사이트 추가">+</button>
      </div>
      <div class="slider-wrap">
        <button class="nav-btn nav-prev" type="button" aria-label="Previous slide">&lt;</button>
        <div class="cards cols-2" id="cards-branding"></div>
        <div class="slider-nav">
          <span class="nav-dots"><i class="nav-dot active"></i><i class="nav-dot"></i><i class="nav-dot"></i></span>
        </div>
        <button class="nav-btn nav-next" type="button" aria-label="Next slide">&gt;</button>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2 class="section-title">Motion</h2>
        <button type="button" class="add-icon-btn" data-add-reference data-category="cards-motion"
          data-category-label="Motion" aria-label="Motion에 사이트 추가">+</button>
      </div>
      <div class="slider-wrap">
        <button class="nav-btn nav-prev" type="button" aria-label="Previous slide">&lt;</button>
        <div class="cards cols-2" id="cards-motion"></div>
        <div class="slider-nav">
          <span class="nav-dots"><i class="nav-dot active"></i><i class="nav-dot"></i><i class="nav-dot"></i></span>
        </div>
        <button class="nav-btn nav-next" type="button" aria-label="Next slide">&gt;</button>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="reference-modal" hidden>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="reference-modal-title">
      <div class="modal-head">
        <h2 id="reference-modal-title" class="modal-title">레퍼런스 추가</h2>
        <button type="button" class="modal-close" id="reference-modal-close" aria-label="닫기">×</button>
      </div>
      <form class="add-form" id="reference-form">
        <label>
          사이트 이름
          <input type="text" name="name" maxlength="50" placeholder="예: Behance" required />
        </label>
        <label>
          사이트 URL
          <input type="url" name="url" placeholder="https://example.com" required />
        </label>
        <label>
          간단 설명
          <input type="text" name="description" maxlength="90" placeholder="이 사이트를 추천하는 이유를 적어주세요." />
        </label>
        <label>
          태그(선택)
          <input type="text" name="tags" maxlength="80" placeholder="#영감, #UI패턴, #브랜딩" />
        </label>
        <label>
          썸네일 이미지(선택)
          <input type="file" name="imageFile" accept="image/*" />
        </label>
        <button type="submit" class="add-btn">레퍼런스 추가</button>
        <p class="form-status" id="form-status" aria-live="polite"></p>
      </form>
    </div>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>

</html>
